name: Build and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Extra Metrics & Versioning
      id: meta
      run: |
        # Extract version and artifactId from pom.xml
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        ARTIFACT=$(mvn help:evaluate -Dexpression=project.artifactId -q -DforceStdout)
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "artifact=$ARTIFACT" >> $GITHUB_OUTPUT
        
        # Construct the final display name with run number
        echo "display_version=$VERSION-${{ github.run_number }}" >> $GITHUB_OUTPUT

    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    - name: Prepare Assets
      run: |
        VERSION="${{ steps.meta.outputs.version }}"
        ARTIFACT="${{ steps.meta.outputs.artifact }}"
        RUN_NUMBER="${{ github.run_number }}"
        
        # Original name generated by Maven
        ORIGINAL_JAR="target/$ARTIFACT-$VERSION.jar"
        
        # Custom name as requested: VERSION-RUN.jar
        # Example: 1.0-SNAPSHOT-23.jar
        CUSTOM_JAR_NAME="$ARTIFACT-$VERSION-$RUN_NUMBER.jar"
        
        cp "$ORIGINAL_JAR" "$CUSTOM_JAR_NAME"
        echo "jar_name=$CUSTOM_JAR_NAME" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v${{ steps.meta.outputs.display_version }}"
        name: "Build ${{ steps.meta.outputs.display_version }}"
        body: |
          Automatic build for TBans.
          
          **Version:** `${{ steps.meta.outputs.version }}`
          **Build Number:** `${{ github.run_number }}`
          **Artifact:** `${{ env.jar_name }}`
        draft: false
        prerelease: false
        files: |
          ${{ env.jar_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
