prefix: "<gradient:#8bb0f5:#f58be8><b>TBans</b></gradient> <#af86b3>»</#af86b3> "
no_permission: "{prefix}<#ff7396>You do not have permission to use this command!</#ff7396>"

ban:
  usage: "{prefix}<#ff7396>Usage: /ban <player> <time> <reason></#ff7396>"
  invalid_time: "{prefix}<#ff7396>Invalid time format!</#ff7396>"
  success: "<gradient:#8af0e6:#8bb0f5><b>SUCCESS</b></gradient> <#af86b3>»</#af86b3> <#d58af0>Banned <#8af0e6>{target_head}{player}</#8af0e6> for <#8af0e6>{duration}</#8af0e6> (<#af86b3>{reason}</#af86b3>)</#d58af0>"
  broadcast: "{prefix}<#af86b3>Player <#ff7396>{target_head}{player}</#ff7396> was <b>banned</b> by <#8af0e6>{executor_head}{executor}</#8af0e6> for <#8af0e6>{duration}</#8af0e6> (<#d58af0>{reason}</#d58af0>)</#af86b3>"
  cannot_punish: "{prefix}<#ff7396>You cannot ban this player!</#ff7396>"
  disconnect_screen: "<gradient:#ff7396:#f58be8><b>YOU ARE BANNED!</b></gradient>\n\n<#af86b3>Duration: <#8af0e6>{duration}</#8af0e6>\n<#af86b3>Reason: <#d58af0>{reason}</#d58af0>\n<#af86b3>Ban Code: <#8af0e6>{ban_code}</#8af0e6>"
  not_found: "{prefix}<#ff7396>Player not found or not online!</#ff7396>"
  login_denied: "<gradient:#ff7396:#f58be8><b>YOU ARE BANNED FROM THIS NETWORK!</b></gradient>\n\n<#af86b3>Reason: <#8af0e6>{reason}</#8af0e6>\n<#af86b3>Expires: <#8af0e6>{expiry}</#8af0e6>\n<#af86b3>Time remaining: <#8af0e6>{left}</#8af0e6>\n<#af86b3>Ban Code: <#8af0e6>{ban_code}</#8af0e6>\n\n<gradient:#8bb0f5:#f58be8>Appeal at domain.com</gradient>"

unban:
  usage: "{prefix}<#ff7396>Usage: /unban <player> [reason]</#ff7396>"
  not_banned: "{prefix}<#ff7396>This player is not banned!</#ff7396>"
  success: "<gradient:#8af0e6:#8bb0f5><b>SUCCESS</b></gradient> <#af86b3>»</#af86b3> <#d58af0>Unbanned <#8af0e6>{target_head}{player}</#8af0e6> (<#af86b3>{reason}</#af86b3>)</#d58af0>"
  broadcast: "{prefix}<#af86b3>Player <#8bb0f5>{target_head}{player}</#8bb0f5> was <b>unbanned</b> by <#8af0e6>{executor_head}{executor}</#8af0e6> (<#d58af0>{reason}</#d58af0>)</#af86b3>"
  not_found: "{prefix}<#ff7396>Player not found or not online!</#ff7396>"

kick:
  usage: "{prefix}<#ff7396>Usage: /kick <player> [reason]</#ff7396>"
  not_found: "{prefix}<#ff7396>Player not found or not online!</#ff7396>"
  success: "<gradient:#8af0e6:#8bb0f5><b>SUCCESS</b></gradient> <#af86b3>»</#af86b3> <#d58af0>Kicked <#8af0e6>{target_head}{player}</#8af0e6> (<#af86b3>{reason}</#af86b3>)</#d58af0>"
  broadcast: "{prefix}<#af86b3>Player <#ff7396>{target_head}{player}</#ff7396> was <b>kicked</b> by <#8af0e6>{executor_head}{executor}</#8af0e6> (<#d58af0>{reason}</#d58af0>)</#af86b3>"
  cannot_punish: "{prefix}<#ff7396>You cannot kick this player!</#ff7396>"
  disconnect_screen: "<gradient:#ff7396:#f58be8><b>YOU WERE KICKED!</b></gradient>\n\n<#af86b3>Reason: <#d58af0>{reason}</#d58af0>\n\n<gradient:#8bb0f5:#f58be8>Please read our rules before rejoining.</gradient>"

blame:
  usage: "{prefix}<#ff7396>Usage: /blame <staff></#ff7396>"
  empty: "{prefix}<#af86b3>No actions found by <#8af0e6>{staff}</#8af0e6></#af86b3>"
  not_found: "{prefix}<#ff7396>Staff member not found!</#ff7396>"
  header: "\n<gradient:#8af0e6:#8bb0f5><b>Staff Audit: {staff}</b></gradient>"
  totals: "<#af86b3>Total Actions: <#d58af0>{total}</#d58af0> (<#ff7396>{bans} Bans</#ff7396>, <#8bb0f5>{unbans} Unbans</#8bb0f5>)</#af86b3>"
  recent_header: "<#af86b3>Recent 5 Actions:</#af86b3>"
  action_line: "<#af86b3>[{date}] {type} <#8af0e6>{target}</#8af0e6> <#8bb0f5>»</#8bb0f5> <#d58af0>{reason}</#d58af0></#af86b3>"
  footer: "<#af86b3>-----------------------------------</#af86b3>"
  type_ban: "<#ff7396>BAN</#ff7396>"
  type_unban: "<#8bb0f5>UNBAN</#8bb0f5>"

history:
  usage: "{prefix}<#ff7396>Usage: /history <player></#ff7396>"
  empty: "{prefix}<#af86b3>No history found for <#8af0e6>{player}</#8af0e6></#af86b3>"
  not_found: "{prefix}<#ff7396>Player not found!</#ff7396>"
  header: "\n<gradient:#8bb0f5:#f58be8><b>History for {player}</b></gradient>"
  divider: "<#af86b3>-----------------------------------</#af86b3>"
  status_never: "<gradient:#8af0e6:#8bb0f5>BANSTATUS: NEVER</gradient>"
  status_banned: "<gradient:#ff7396:#f58be8>BANSTATUS: BANNED</gradient>"
  status_expired: "<gradient:#8bb0f5:#f58be8>BANSTATUS: EXPIRED / UNBANNED</gradient>"
  action_line: "<#af86b3>[{date}] {type} by <#8af0e6>{executor}</#8af0e6>: <#d58af0>{reason}</#d58af0>{expiry_info}"
  expiry_until: " <#8bb0f5>(until {expiry})</#8bb0f5>"
  expiry_until_left: " <#8bb0f5>(until {expiry}, {left} left)</#8bb0f5>"
  expiry_permanent: " <#8bb0f5>(Permanent)</#8bb0f5>"
